<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            margin: 0; padding: 80px; width: 1080px; height: 1350px;
            background: #050505; color: #ffffff; font-family: 'Inter', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; justify-content: center; position: relative; box-sizing: border-box;
        }
        .logo { position: absolute; top: 60px; right: 60px; height: 40px; z-index: 10; }
        h2 { font-size: 64px; font-weight: 900; line-height: 1.2; margin-bottom: 60px; color: #ffffff; z-index: 5; position: relative; }
        .highlight { color: #00D1FF; }
        .text { font-size: 38px; line-height: 1.5; color: #cccccc; z-index: 5; position: relative; }
    </style>
</head>
<body>
    <img src="../../assets/logo-horizontal.png" class="logo">
    <h2>O Segredo: <span class="highlight">Automação Direcionada</span></h2>
    <div class="text">Segundo recente artigo da Exame, o truque é criar comandos robustos e estruturados. Ao delimitar o formato, regras e as estruturas que a IA deve respeitar, você atinge o modelo 80/20 em segundos.</div>
</body>
</html>
