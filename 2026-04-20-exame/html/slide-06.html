<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            margin: 0; padding: 80px; width: 1080px; height: 1350px;
            background: #050505; color: #ffffff; font-family: 'Inter', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; justify-content: center; position: relative; box-sizing: border-box;
        }
        .background {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('../images/bg-01.png'); background-size: cover; background-position: center; opacity: 0.2; z-index: 1;
        }
        .logo { position: absolute; top: 60px; right: 60px; height: 40px; z-index: 10; }
        h2 { font-size: 64px; font-weight: 900; line-height: 1.2; margin-bottom: 60px; color: #ffffff; z-index: 5; position: relative; }
        .highlight { color: #00D1FF; }
        .text { font-size: 38px; line-height: 1.5; color: #cccccc; z-index: 5; position: relative; }
    </style>
</head>
<body>
    <div class="background"></div>
    <img src="../../../assets/logo-horizontal.png" class="logo">
    <h2><span class="highlight">Pare de perder tempo.</span></h2>
    <div class="text">Construa esquadrões de agentes autônomos para o seu negócio com a ZNTH.AI. Transforme a automação no seu maior <b>ativo digital</b>. Acesse o link na bio.</div>
</body>
</html>
